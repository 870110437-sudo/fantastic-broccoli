<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背单词APP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="card" id="card" onclick="toggleMeaning()">
    
    <div class="word" id="word">Loading...</div>
    <div class="ipa" id="ipa"></div>
    <div class="pos" id="pos"></div>

    <div class="meaning hidden" id="meaning"></div>

  </div>

  <div class="controls">
    <button class="btn audio" onclick="playAudio(event)">🔊</button>
    <button class="btn know" onclick="handle(1)">认识</button>
    <button class="btn dont" onclick="handle(0)">不认识</button>
  </div>

  <div class="bottom">
    <button class="delete" onclick="deleteWord()">删除</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

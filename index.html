<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>背单词</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1 id="word">Loading...</h1>
  <p id="ipa"></p>
  <p id="pos"></p>

  <p id="meaning" class="hidden"></p>

  <button onclick="toggleMeaning()">显示/隐藏释义</button>
  <button onclick="playAudio()">🔊 发音</button>

  <div class="actions">
    <button class="know" onclick="handle(1)">认识</button>
    <button class="dont" onclick="handle(0)">不认识</button>
  </div>

  <!-- 新增删除按钮 -->
  <button class="delete" onclick="deleteWord()">🗑 删除这个单词</button>
</div>

<script src="app.js"></script>
</body>
</html>

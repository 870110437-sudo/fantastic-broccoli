<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沉浸式背单词</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-blur"></div>
<div class="app">
  <header class="topbar">
    <h1>Word Flow</h1>
    <div class="mode-switch" id="modeSwitch">
      <button class="seg-btn active" data-mode="en" onclick="switchMode('en')">英 → 中</button>
      <button class="seg-btn" data-mode="cn" onclick="switchMode('cn')">中 → 英</button>
      <div class="seg-indicator" id="segIndicator"></div>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-text" id="progressText">准备中...</div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="card" id="card" onclick="toggleExpand(event)">
    <div class="primary" id="primary" onclick="playAudio(event)">Loading...</div>
    <div class="meta" id="meta"></div>


    <div class="expand" id="expand">
      <div class="meaning" id="meaning"></div>
      <div class="example" id="example"></div>
      <div class="root" id="root"></div>
      <div class="memo-edit">
        <textarea id="memoryMethodInput" class="memo-input" placeholder="填写词根词缀/记忆方法..."></textarea>
        <button class="btn ghost memo-save" onclick="saveMemoryMethod(event)">保存记忆法</button>
      </div>
    </div>
  </div>

  <div class="controls controls-4">
    <button class="btn ghost"  onclick="playPronunciation()">🔊 发音</button>
    <button class="btn ghost slow" onclick="playAudio(event, true)">慢速</button>
    <button class="btn know" onclick="handleKnow(true, event)">认识</button>
    <button class="btn dont" onclick="handleKnow(false, event)">不认识</button>
  </div>

  <div class="bottom-grid">
    <div class="stat-card"><span>今日新词</span><b id="sNew">0</b></div>
    <div class="stat-card"><span>今日已学</span><b id="sDone">0</b></div>
    <div class="stat-card"><span>今日待学</span><b id="sLeft">0</b></div>
    <div class="stat-card"><span>连续学习</span><b id="sStreak">1 天</b></div>
  </div>

  <div class="bottom actions-row">
        <button class="delete" onclick="deleteWord(event)">➕ 添加单词</button>
    <button class="delete" onclick="openAddWordModal(event)">删除当前词</button>
    <button class="delete" onclick="openHistoryModal(event)">查看短文</button>
    <button class="delete" onclick="openSettingsModal()">API设置</button>
  </div>
</div>

<div class="modal hidden" id="passageModal">
  <div class="modal-card">
    <h3>短文测试</h3>
    <p class="modal-hint">红色单词可点击查看中文释义</p>
    <div id="passageContent" class="passage-content"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closePassageModal()">关闭</button>
      <button class="btn know" onclick="closePassageModal(true)">开始下一组</button>
    </div>
  </div>
</div>


  
<div class="modal hidden" id="historyModal">
  <div class="modal-card">
    <h3>历史短文</h3>
    <div id="historyList" class="history-list"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeHistoryModal()">关闭</button>
    </div>
  </div>
</div>


  
<div id="addWordModal" class="modal hidden">
  <div class="modal-box">
    <h3>添加新单词</h3>
    <input
      id="newWordInput"
      placeholder="英文单词"
    />

    <input
      id="newMeaningInput"
      placeholder="中文释义"
    />

    <div class="modal-actions">
      <button onclick="saveNewWord()">
        保存
      </button>

      <button onclick="closeAddWordModal()">
        取消
      </button>
    </div>

  </div>
</div>


  
<div class="modal hidden" id="settingsModal">
  <div class="modal-card">
    <h3>API 设置</h3>
    <p class="modal-hint">为安全起见，Key 仅保存在当前浏览器本地。</p>
    <input id="apiKeyInput" class="api-input" placeholder="输入 shiyunapi key">
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeSettingsModal()">取消</button>
      <button class="btn know" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
  <div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div class="loading-text">AI生成中...</div>
</div>
</body>
</html>
